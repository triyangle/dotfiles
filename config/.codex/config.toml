model = "gpt-5.1-codex"
model_reasoning_effort = "high"
[projects."/workspaces/obsidian"]
trust_level = "trusted"

[notice]
hide_gpt5_1_migration_prompt = true

# MCP servers mirrored from Claude Code config
# IMPORTANT: top-level key is `mcp_servers` (TOML), not `mcpServers` (JSON)
[mcp_servers.figma]
type = "http"
url = "https://mcp.figma.com/mcp"

[mcp_servers.glean_default]
type = "http"
url = "https://vanta-be.glean.com/mcp/default"

[mcp_servers.ESLint]
command = "npx"
args = ["@eslint/mcp@latest"]

[mcp_servers.guru]
command = "/workspaces/obsidian/scripts/ai-playground/src/guru-mcp-server-ts/run-guru-mcp-server.sh"
args = []

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.datetime]
command = "npx"
args = ["-y", "@odgrim/mcp-datetime"]

[mcp_servers.google-drive-mcp]
command = "/workspaces/obsidian/scripts/ai-playground/src/gdrive-mcp-server-ts/run-gdrive-mcp-server.sh"
args = []
env = {
	"GOOGLE_DRIVE_MCP_READONLY_ID" = "${GOOGLE_DRIVE_MCP_READONLY_ID}",
	"GOOGLE_DRIVE_MCP_READONLY_SECRET" = "${GOOGLE_DRIVE_MCP_READONLY_SECRET}"
}

[mcp_servers.datadog]
type = "stdio"
command = "npx"
args = [
	"datadog-mcp-server",
	"--apiKey",
	"${DATADOG_API_KEY}",
	"--appKey",
	"${DATADOG_APP_KEY}",
	"--site",
	"datadoghq.com",
	"--logsSite",
	"logs.datadoghq.com",
	"--metricsSite",
	"datadoghq.com"
]

[mcp_servers.datadog_logs]
type = "stdio"
command = "npx"
args = ["-y", "@i524/datadog-mcp-server", "--stdio"]
env = {
	"DD_API_KEY" = "${DATADOG_API_KEY}",
	"DD_APP_KEY" = "${DATADOG_APP_KEY}"
}
